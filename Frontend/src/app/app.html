<div class="container">
  <div class="form-box">
    <h1 class="form-title">OrderGenerator</h1>

    <form [formGroup]="orderForm" (ngSubmit)="onSubmit()" class="form">
      <!-- Campo Símbolo -->
      <div class="form-group">
        <label for="symbol" class="form-label">Símbolo</label>
        <input
          type="text"
          id="symbol"
          class="form-control"
          formControlName="symbol"
          placeholder="Ex: PETR4"
          [class.is-invalid]="submitted && f['symbol'].errors"
        />
        <div class="error-message" *ngIf="submitted && f['symbol'].errors">
          <span *ngIf="f['symbol'].errors['required']">Símbolo é obrigatório</span>
        </div>
      </div>

      <!-- Campo Lado (Botões) -->
      <div class="form-group">
        <label class="form-label">Lado</label>
        <div class="side-buttons">
          <button
            type="button"
            class="btn-side btn-compra"
            [class.active]="f['side'].value === 'COMPRA'"
            (click)="selectSide('COMPRA')"
          >
            COMPRA
          </button>
          <button
            type="button"
            class="btn-side btn-venda"
            [class.active]="f['side'].value === 'VENDA'"
            (click)="selectSide('VENDA')"
          >
            VENDA
          </button>
        </div>
      </div>

      <!-- Campo Quantidade -->
      <div class="form-group">
        <label for="quantity" class="form-label">Quantidade</label>
        <input
          type="text"
          id="quantity"
          class="form-control"
          formControlName="quantity"
          placeholder="Ex: 100"
          (input)="onQuantityInput($event)"
          [class.is-invalid]="
            (submitted || (f['quantity'].touched && f['quantity'].value)) && f['quantity'].errors
          "
        />
        <div
          class="error-message"
          *ngIf="
            (submitted || (f['quantity'].touched && f['quantity'].value)) && f['quantity'].errors
          "
        >
          <span *ngIf="submitted && f['quantity'].errors['required']"
            >Quantidade é obrigatória</span
          >
          <span *ngIf="f['quantity'].touched && f['quantity'].value && f['quantity'].errors['min']"
            >Quantidade deve ser maior que 0</span
          >
          <span *ngIf="f['quantity'].touched && f['quantity'].value && f['quantity'].errors['max']"
            >Quantidade deve ser no máximo 99999</span
          >
        </div>
      </div>

      <!-- Campo Preço -->
      <div class="form-group">
        <label for="price" class="form-label">Preço</label>
        <input
          type="number"
          id="price"
          class="form-control"
          formControlName="price"
          placeholder="Ex: 25.50"
          min="0.01"
          step="0.01"
          [class.is-invalid]="submitted && f['price'].errors"
        />
        <div class="error-message" *ngIf="submitted && f['price'].errors">
          <span *ngIf="f['price'].errors['required']">Preço é obrigatório</span>
          <span *ngIf="f['price'].errors['min']">Preço deve ser maior que 0</span>
        </div>
      </div>

      <!-- Botão Enviar -->
      <button type="submit" class="btn-submit">
        <span>Enviar Ordem</span>
      </button>
    </form>
  </div>
</div>
